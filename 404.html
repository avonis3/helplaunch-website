<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Page Not Found — HelpLaunch</title>
<meta name="robots" content="noindex"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:#FDFAF6;color:#292524;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:40px 24px}
.badge{font-size:5rem;margin-bottom:24px}
h1{font-size:clamp(2rem,6vw,3.2rem);font-weight:800;color:#1C1917;line-height:1.2;margin-bottom:16px}
p{color:#78716C;font-size:1.05rem;max-width:480px;line-height:1.7;margin-bottom:36px}
.btn{display:inline-block;background:#F97316;color:#fff;padding:14px 32px;border-radius:99px;font-weight:700;font-size:.95rem;text-decoration:none;transition:background .2s,transform .15s}
.btn:hover{background:#EA580C;transform:translateY(-2px)}
.sub{margin-top:20px;font-size:.85rem;color:#a8a29e}
.sub a{color:#F97316;text-decoration:none}
</style>
</head>
<body>
  <div class="badge">🔍</div>
  <h1>Page not found</h1>
  <p>This page doesn't exist or may have been moved. Let's get you back on track.</p>
  <a href="/" class="btn">Go to HelpLaunch Home</a>
  <p class="sub">Need help? Email us at <a href="mailto:info@helplaunch.in">info@helplaunch.in</a></p>
</body>
</html>
